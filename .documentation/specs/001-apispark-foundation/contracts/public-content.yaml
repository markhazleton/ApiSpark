openapi: "3.1.0"
info:
  title: ApiSpark Public Content API
  version: "1.0.0"
  description: |
    Anonymous, read-only public content endpoints.
    Returns published articles and tags. Draft articles are never exposed.
    Part of the /api/public route group — no authentication required.

servers:
  - url: https://api.markhazleton.com
    description: Production
  - url: http://localhost:5000
    description: Local development

paths:
  /api/public/content/articles:
    get:
      operationId: GetPublishedArticles
      summary: List all published articles
      description: |
        Returns a list of all published articles. Draft articles are excluded.
        List items contain summary fields only (slug, title, summary, publishDate, tags).
        Full body content is not included in the list — use GetArticleBySlug to retrieve full content.
        No pagination — returns all published articles in a single response.
      tags:
        - PublicContent
      security: []
      responses:
        "200":
          description: List of published articles (may be empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArticleSummary"
              example:
                - slug: "hello-world"
                  title: "Hello World"
                  summary: "Introduction to ApiSpark."
                  publishDate: "2026-05-07T00:00:00Z"
                  tags: ["general", "intro"]

  /api/public/content/articles/{slug}:
    get:
      operationId: GetArticleBySlug
      summary: Get a single published article by slug
      description: |
        Returns the full detail of a published article, including the complete Markdown body.
        Draft articles are not accessible — returns 404 for draft slugs as well as missing slugs.
      tags:
        - PublicContent
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          description: URL-safe slug identifying the article (lowercase, hyphen-separated)
          schema:
            type: string
            pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
            example: "hello-world"
      responses:
        "200":
          description: Full article detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleDetail"
              example:
                slug: "hello-world"
                title: "Hello World"
                summary: "Introduction to ApiSpark."
                body: "# Hello World\n\nWelcome to ApiSpark.\n"
                publishDate: "2026-05-07T00:00:00Z"
                tags: ["general", "intro"]
        "404":
          description: Article not found or is a draft
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
              example:
                type: "https://tools.ietf.org/html/rfc9110#section-15.5.5"
                title: "Not Found"
                status: 404
                detail: "Article 'hello-world' not found."

  /api/public/content/tags:
    get:
      operationId: GetAllTags
      summary: List all tags
      description: |
        Returns the list of all tags. No authentication required.
        Returns an empty list when no tags exist.
      tags:
        - PublicContent
      security: []
      responses:
        "200":
          description: List of all tags (may be empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TagResponse"
              example:
                - name: "general"
                - name: "intro"
                - name: "apispark"

components:
  schemas:
    ArticleSummary:
      type: object
      required:
        - slug
        - title
        - summary
        - tags
      properties:
        slug:
          type: string
          description: Unique URL-safe identifier
          example: "hello-world"
        title:
          type: string
          description: Article title
          example: "Hello World"
        summary:
          type: string
          description: Short description of the article
          example: "Introduction to ApiSpark."
        publishDate:
          type: string
          format: date-time
          nullable: true
          description: UTC datetime the article was published; null if not yet published
          example: "2026-05-07T00:00:00Z"
        tags:
          type: array
          items:
            type: string
          description: Tag names associated with this article
          example: ["general", "intro"]

    ArticleDetail:
      type: object
      required:
        - slug
        - title
        - summary
        - body
        - tags
      properties:
        slug:
          type: string
          example: "hello-world"
        title:
          type: string
          example: "Hello World"
        summary:
          type: string
          example: "Introduction to ApiSpark."
        body:
          type: string
          description: Full article content as raw Markdown string; rendering is the client's responsibility
          example: "# Hello World\n\nWelcome to ApiSpark.\n"
        publishDate:
          type: string
          format: date-time
          nullable: true
          example: "2026-05-07T00:00:00Z"
        tags:
          type: array
          items:
            type: string
          example: ["general", "intro"]

    TagResponse:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Tag name
          example: "general"

    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
