openapi: "3.0.3"
info:
  title: ApiSpark – WebSpark CMS API
  version: "1.0.0"
  description: |
    Public read-only and admin CRUD endpoints for the WebSpark.Core CMS domain.
    Public routes are anonymous. Admin routes require the AdminOnly policy (JWT Bearer, Admin role).

servers:
  - url: https://api.markhazleton.com
    description: Production

tags:
  - name: WebSpark-Domains
  - name: WebSpark-Blogs
  - name: WebSpark-Authors
  - name: WebSpark-Posts
  - name: WebSpark-Categories
  - name: WebSpark-Menu
  - name: WebSpark-Keywords
  - name: WebSpark-ContentParts
  - name: WebSpark-Subscribers
  - name: WebSpark-Newsletters
  - name: WebSpark-MailSettings

paths:

  # ── Domains ──────────────────────────────────────────────────────────────────

  /api/public/webspark/domains:
    get:
      operationId: GetDomains
      summary: List all domains
      tags: [WebSpark-Domains]
      security: []
      responses:
        "200":
          description: Array of domains
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WebSite'

  /api/public/webspark/domains/{id}:
    get:
      operationId: GetDomain
      summary: Get a domain by ID
      tags: [WebSpark-Domains]
      security: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        "200":
          description: Domain found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebSite'
        "404":
          description: Not found

  /api/admin/webspark/domains:
    post:
      operationId: CreateDomain
      summary: Create a domain
      tags: [WebSpark-Domains]
      security:
        - adminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebSite'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebSite'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /api/admin/webspark/domains/{id}:
    put:
      operationId: UpdateDomain
      summary: Update a domain
      tags: [WebSpark-Domains]
      security:
        - adminAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebSite'
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebSite'
        "404":
          description: Not found
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
    delete:
      operationId: DeleteDomain
      summary: Delete a domain
      tags: [WebSpark-Domains]
      security:
        - adminAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

